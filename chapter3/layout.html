<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagr Layout</title>
</head>

<body>
    <header>This is Header
        <br>
        <nav>
            <a href="about.html" target="_blank">about us</a>
            <br>
            <a href="https://www.merriam-webster.com/dictionary/about" target="_blank">about you</a>
        </nav>
    </header>
    <main><!-- The main opening tag -->
        <main>
            <!-- A page section -->
            <section>
                <!-- A self-contained content -->
                <article>
                    <!-- Content goes here -->
                     <div>
                        i am div
                     </div>
                     <div>
                        i am another div
                     </div>

                      <span>
                        i am span
                     </span>
                     <span>
                        i am another span
                     </span>
                </article>
            </section>
            <!-- Content aside from the main content (e.g. Ads, sidebars) -->
            <aside>
                <!-- Aside content goes here -->
            </aside>
        </main>
        <!-- The main closing tag -->
    </main>
    <footer>this is footer</footer>
</body>

</html>
